class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none transition-colors text-sm"
placeholder="비밀번호를 입력하세요">

<div class="carousel-slide" style="background-image: url('https://readdy.ai/api/search-image?query=innovative%20teacher%20platform%20launch%20celebration%20with%20modern%20educational%20technology%20clean%20white%20background%20professional%20learning%20system%20interface&width=800&height=500&seq=launch2&orientation=landscape');">

<div class="absolute inset-0 bg-black bg-opacity-40"></div>

<button id="prev-btn" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-10 h-10 bg-white bg-opacity-80 hover:bg-opacity-100 rounded-full flex items-center justify-center transition-all">

<script id="tab-switching">
document.addEventListener('DOMContentLoaded', function() {
const studentTab = document.getElementById('student-tab');
const teacherTab = document.getElementById('teacher-tab');
const usernameInput = document.getElementById('username');
function switchTab(activeTab, inactiveTab, placeholder) {
activeTab.classList.add('bg-secondary', 'text-white');
activeTab.classList.remove('text-gray-600', 'hover:text-gray-800');
inactiveTab.classList.remove('bg-secondary', 'text-white');
inactiveTab.classList.add('text-gray-600', 'hover:text-gray-800');
usernameInput.placeholder = placeholder;
}
studentTab.addEventListener('click', function() {
switchTab(studentTab, teacherTab, '학생 아이디를 입력하세요');
});
teacherTab.addEventListener('click', function() {
switchTab(teacherTab, studentTab, '선생님 아이디를 입력하세요');
});
});
</script>
<script id="form-validation">
document.addEventListener('DOMContentLoaded', function() {
const form = document.getElementById('login-form');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const usernameError = document.getElementById('username-error');
const passwordError = document.getElementById('password-error');
form.addEventListener('submit', function(e) {
e.preventDefault();
let hasError = false;
if (!usernameInput.value.trim()) {
usernameError.classList.remove('hidden');
usernameInput.classList.add('border-secondary');
hasError = true;
} else {
usernameError.classList.add('hidden');
usernameInput.classList.remove('border-secondary');
}
if (!passwordInput.value.trim()) {
passwordError.classList.remove('hidden');
passwordInput.classList.add('border-secondary');
hasError = true;
} else {
passwordError.classList.add('hidden');
passwordInput.classList.remove('border-secondary');
}
if (!hasError) {
alert('로그인 처리 중...');
}
});
usernameInput.addEventListener('input', function() {
if (this.value.trim()) {
usernameError.classList.add('hidden');
this.classList.remove('border-secondary');
}
});
passwordInput.addEventListener('input', function() {
if (this.value.trim()) {
passwordError.classList.add('hidden');
this.classList.remove('border-secondary');
}
});
});
</script>
<script id="carousel-functionality">
document.addEventListener('DOMContentLoaded', function() {
const slides = document.querySelectorAll('.carousel-slide');
const dots = document.querySelectorAll('.dot');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
let currentSlide = 0;
let autoSlideInterval;
function showSlide(index) {
slides.forEach((slide, i) => {
slide.classList.toggle('active', i === index);
});
dots.forEach((dot, i) => {
if (i === index) {
dot.classList.add('active');
dot.classList.remove('bg-opacity-50');
} else {
dot.classList.remove('active');
dot.classList.add('bg-opacity-50');
}
});
currentSlide = index;
}
function nextSlide() {
const next = (currentSlide + 1) % slides.length;
showSlide(next);
}
function prevSlide() {
const prev = (currentSlide - 1 + slides.length) % slides.length;
showSlide(prev);
}
function startAutoSlide() {
autoSlideInterval = setInterval(nextSlide, 4000);
}
function stopAutoSlide() {
clearInterval(autoSlideInterval);
}
nextBtn.addEventListener('click', function() {
stopAutoSlide();
nextSlide();
startAutoSlide();
});
prevBtn.addEventListener('click', function() {
stopAutoSlide();
prevSlide();
startAutoSlide();
});
dots.forEach((dot, index) => {
dot.addEventListener('click', function() {
stopAutoSlide();
showSlide(index);
startAutoSlide();
});
});
const carouselContainer = document.getElementById('carousel-container');
carouselContainer.addEventListener('mouseenter', stopAutoSlide);
carouselContainer.addEventListener('mouseleave', startAutoSlide);
startAutoSlide();
});
</script>
<style>
.carousel-slide {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-size: cover;
background-position: center;
opacity: 0;
transition: opacity 0.5s ease-in-out;
}
.carousel-slide.active {
opacity: 1;
}
input[type="checkbox"] {
appearance: none;
background-color: #f3f4f6;
border: 1px solid #d1d5db;
border-radius: 4px;
width: 1rem;
height: 1rem;
display: inline-block;
position: relative;
cursor: pointer;
}
input[type="checkbox"]:checked {
background-color: #E75B36;
border-color: #E75B36;
}
input[type="checkbox"]:checked::after {
content: '✓';
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
color: white;
font-size: 0.75rem;
font-weight: bold;
}
input[type="checkbox"]:focus {
outline: 2px solid #E75B36;
outline-offset: 2px;
}
</style>
